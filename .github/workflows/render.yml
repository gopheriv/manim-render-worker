name: render
run-name: render ${{ inputs.job_id }}

# Free cloud Manim render worker. Dispatched by the bot's cloud_render.py.
# On a PUBLIC repo this runs on a 4 vCPU / 16 GB runner with unlimited minutes —
# enough for 1080p, Surfaces/3D and parallel best-of-N drafts.

on:
  workflow_dispatch:
    inputs:
      code_gz:
        description: "gzip+base64 of the Manim scene code"
        required: true
      quality:
        description: "Manim quality flag (-ql/-qm/-qh/-qk)"
        required: false
        default: "-qh"
      fps:
        description: "frames per second"
        required: false
        default: "60"
      job_id:
        description: "unique id (also the artifact suffix)"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    # Must stay COMFORTABLY above ci_render.py's RENDER_TIMEOUT_S (default 60 min)
    # PLUS the apt/pip setup steps (~5 min). If they were equal, GitHub would hard-
    # cancel the job (opaque "cancelled", no artifact) before ci_render's graceful
    # "render timed out — likely an infinite loop" message could fire. The headroom
    # lets the worker own its own timeout and surface a real error instead.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: System deps (LaTeX, cairo, pango, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libcairo2-dev libpango1.0-dev pkg-config \
            texlive texlive-latex-extra texlive-fonts-extra texlive-science \
            dvisvgm dvipng

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Manim
        run: pip install "manim>=0.18,<0.21" numpy

      - name: Render
        env:
          CODE_GZ: ${{ inputs.code_gz }}
          QUALITY: ${{ inputs.quality }}
          FPS: ${{ inputs.fps }}
          JOB_ID: ${{ inputs.job_id }}
        # pipefail so a failure in the render command fails the step with its real
        # exit code; ci_render.py prints the full manim error to this log on failure.
        run: |
          set -euo pipefail
          python deploy/ci_render.py

      - name: Upload video
        uses: actions/upload-artifact@v5
        with:
          name: render-${{ inputs.job_id }}
          path: out/render.mp4
          if-no-files-found: error
          retention-days: 1
